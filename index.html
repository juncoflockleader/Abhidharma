<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿毗达摩互动表解 v1.0.0</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body class="citta-tab-active inspector-tab-active">
<div id="tooltip" style="position: absolute; visibility: hidden; background-color: #f0f0f0; padding: 5px; border-radius: 5px; border: 1px solid #ccc; pointer-events: none;"></div>
<button id="left-sidebar-toggle" class="sidebar-toggle sidebar-toggle--left" type="button" aria-controls="primary-menu" aria-expanded="true" aria-label="收起左侧导航" title="收起左侧导航">‹</button>
<div class="menu" id="primary-menu">
  <div class="tabs" role="tablist" aria-label="阿毗达摩图表">
    <button id="tab1" class="active" type="button" role="tab" data-tab-id="citta" aria-controls="container1" aria-selected="true" tabindex="0">心与心所</button>
    <button id="tab2" type="button" role="tab" data-tab-id="sense-flow" aria-controls="container2" aria-selected="false" tabindex="-1">欲界五门心路</button>
    <button id="tab3" type="button" role="tab" data-tab-id="mind-flow" aria-controls="container3" aria-selected="false" tabindex="-1">欲界意门心路</button>
    <button id="tab4" type="button" role="tab" data-tab-id="rupa" aria-controls="container4" aria-selected="false" tabindex="-1">欲界色法</button>
    <button id="tab5" type="button" role="tab" data-tab-id="rupa-origin" aria-controls="container5" aria-selected="false" tabindex="-1">色法起源</button>
    <button id="tab6" type="button" role="tab" data-tab-id="dependent-origin" aria-controls="container6" aria-selected="false" tabindex="-1">欲界十二缘起</button>
    <button id="tab7" type="button" role="tab" data-tab-id="conditions-map" aria-controls="container7" aria-selected="false" tabindex="-1">五十二缘对应</button>
    <button id="tab8" type="button" role="tab" data-tab-id="cause-condition" aria-controls="container8" aria-selected="false" tabindex="-1">五十二缘溯源</button>
    <button id="tab9" type="button" role="tab" data-tab-id="about" aria-controls="container9" aria-selected="false" tabindex="-1">写在后面的话</button>
    <button id="tab10" type="button" role="tab" data-tab-id="simulation" aria-controls="container10" aria-selected="false" tabindex="-1" style="display:none">色法模拟</button>
  </div>
  <div class="lang" aria-label="Language / 语言">
    <button id="en" type="button" aria-label="Switch to English" title="English">
      <svg width="32" height="32" aria-hidden="true">
        <image href="images/en.svg" x="0" y="0" width="28" height="28"></image>
      </svg>
    </button>
    <button id="cn" type="button" aria-label="切换到中文" title="中文">
      <svg width="32" height="32" aria-hidden="true">
        <image href="images/cn.svg" x="0" y="0" width="28" height="28"></image>
      </svg>
    </button>
  </div>
  <div class="test-div">
    <svg id="test-svg" width="32" height="32"></svg>
  </div>
</div>
<button id="right-sidebar-toggle" class="sidebar-toggle sidebar-toggle--right" type="button" aria-controls="citta-inspector rupa-inspector senseflowinspector mindflowinspector rupa-origin-inspector dependent-origin-inspector conditions-inspector" aria-expanded="true" aria-label="收起右侧详情" title="收起右侧详情">›</button>
<div class="svg-container">
  <div class ="svg-sub-container active" id="container1" role="tabpanel" aria-labelledby="tab1" aria-hidden="false">
    <div class="citta-workspace">
      <div id="citta-guide" class="study-guide study-guide--citta" data-study-page="citta"></div>
      <div class="citta-canvas" aria-label="心与心所互动表">
        <div class="svg-scroll" id="citta-scroll" tabindex="0" aria-label="可水平滚动的心与心所表格">
          <svg id="citta-svg" width="1800" height="800" role="group" aria-label="心与心所关系图"></svg>
        </div>
      </div>
      <aside id="citta-inspector" class="citta-inspector" aria-label="当前选中项详情" aria-live="polite">
        <div class="study-guide__panel" data-study-panel="citta"></div>
      </aside>
    </div>
    <svg class="repo-link" width="32" height="32" aria-hidden="true">
      <a href="https://github.com/juncoflockleader/Abhidharma" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <image href="images/github-square.svg" x="0" y="0" width="32" height="32"></image>
      </a>
    </svg>
  </div>
  <div class ="svg-sub-container" id="container2" role="tabpanel" aria-labelledby="tab2" aria-hidden="true" hidden>
    <div class="flow-workspace" id="sense-flow-workspace">
      <section class="flow-summary" id="senseflowsummary" aria-live="polite"></section>
      <section class="flow-controls" id="senseflowcontrols" aria-label="五门心路情境控制"></section>
      <div class="flow-layout">
        <div class="flow-canvas">
          <div class="flow-scroll" id="senseflow" tabindex="0" aria-label="可横向滚动的五门心路时间线"></div>
        </div>
        <aside class="flow-inspector" id="senseflowinspector" aria-label="五门心路阶段详情" aria-live="polite"></aside>
      </div>
    </div>
  </div>
  <div class ="svg-sub-container" id="container3" role="tabpanel" aria-labelledby="tab3" aria-hidden="true" hidden>
    <div class="flow-workspace" id="mind-flow-workspace">
      <section class="flow-summary" id="mindflowsummary" aria-live="polite"></section>
      <section class="flow-controls" id="mindflowcontrols" aria-label="意门心路情境控制"></section>
      <div class="flow-layout">
        <div class="flow-canvas">
          <div class="flow-scroll" id="mindflow" tabindex="0" aria-label="可横向滚动的意门心路时间线"></div>
        </div>
        <aside class="flow-inspector" id="mindflowinspector" aria-label="意门心路阶段详情" aria-live="polite"></aside>
      </div>
    </div>
  </div>
  <div class="svg-sub-container" id="container4" role="tabpanel" aria-labelledby="tab4" aria-hidden="true" hidden>
    <div class="rupa-workspace">
      <div id="rupa-guide" class="study-guide study-guide--rupa" data-study-page="rupa"></div>
      <div class="rupa-canvas" aria-label="色法互动表">
        <div class="svg-scroll" id="rupa-scroll" tabindex="0" aria-label="可滚动的色法与色聚表格">
          <div id="rupa-svg-stage"></div>
        </div>
      </div>
      <aside id="rupa-inspector" class="rupa-inspector" aria-label="当前选中色法详情" aria-live="polite">
        <div class="study-guide__panel" data-study-panel="rupa"></div>
      </aside>
    </div>
  </div>
  <div class="svg-sub-container" id="container5" role="tabpanel" aria-labelledby="tab5" aria-hidden="true" hidden>
    <div class="rupa-origin-workspace">
      <section id="rupa-origin-summary" class="rupa-origin-summary" aria-live="polite"></section>
      <section id="rupa-origin-controls" class="rupa-origin-controls"></section>
      <div class="rupa-origin-layout">
        <main id="rupa-origin-map" class="rupa-origin-map" tabindex="0"></main>
        <aside id="rupa-origin-inspector" class="rupa-origin-inspector" aria-live="polite"></aside>
      </div>
    </div>
  </div>
  <div class="svg-sub-container" id="container6" role="tabpanel" aria-labelledby="tab6" aria-hidden="true" hidden>
    <div class="dependent-origin-workspace">
      <section id="dependent-origin-summary" class="dependent-origin-summary" aria-live="polite"></section>
      <section id="dependent-origin-controls" class="dependent-origin-controls"></section>
      <div class="dependent-origin-layout">
        <main id="dependent-origin-map" class="dependent-origin-map" tabindex="0"></main>
        <aside id="dependent-origin-inspector" class="dependent-origin-inspector" aria-live="polite"></aside>
      </div>
    </div>
  </div>
  <div class="svg-sub-container" id="container7" role="tabpanel" aria-labelledby="tab7" aria-hidden="true" hidden>
    <div class="conditions-workspace" id="conditions-workspace">
      <section id="conditions-summary" class="conditions-summary" aria-live="polite"></section>
      <section id="conditions-controls" class="conditions-controls" aria-label="五十二缘筛选"></section>
      <div class="conditions-layout">
        <main class="conditions-explorer">
          <nav id="conditions-navigator" class="conditions-navigator" aria-label="五十二缘目录"></nav>
          <div class="conditions-content">
            <section id="conditions-relation" class="conditions-relation" aria-live="polite"></section>
            <section id="conditions-results" class="conditions-results" aria-label="具体缘规则"></section>
          </div>
        </main>
        <aside id="conditions-inspector" class="conditions-inspector" aria-label="当前规则详情" aria-live="polite"></aside>
      </div>
    </div>
  </div>
  <div class="svg-sub-container" id="container8" role="tabpanel" aria-labelledby="tab8" aria-hidden="true" hidden>
    <div id="cause-condition-container" style="display: flex">
      <svg id="cause-condition-svg" width="1300" height="700"></svg>
    </div>
    <div id="causeconditioncontrols"></div>
  </div>
  <div class="svg-sub-container" id="container9" role="tabpanel" aria-labelledby="tab9" aria-hidden="true" hidden>
    <svg id="my-words-svg" width="830" height="500"></svg>
    <div>
      <svg class="repo-link" width="32" height="32" aria-hidden="true">
        <a href="https://github.com/juncoflockleader/Abhidharma" target="_blank">
          <image href="images/github-square.svg" x="0" y="0" width="32" height="32"></image>
        </a>
      </svg>
    </div>
  </div>
  <div class="svg-sub-container" id="container10" role="tabpanel" aria-labelledby="tab10" aria-hidden="true" hidden>
    <div style="display: flex">
      <svg id="simulation" width="800" height="600" style="border: 1px solid black;"></svg>
      <svg id="simulation-notes" width="200" height="600" ></svg>
    </div>
    <p></p>
    <div id="controls">
      <button id="startStopBtn">开始</button>
      <button id="pauseResumeBtn" disabled>暂停</button>
    </div>
  </div>
</div>
<script src="libs/d3.v7.js"></script>
<script src="libs/d3-simple-slider.js"></script>
<script src="js/translations.js"></script>
<script src="js/common-lang.js"></script>

<script src="js/common-frame.js"></script>
<script src="js/sidebar-layout.js"></script>
<script src="js/page-state.js"></script>
<script src="js/view-model.js"></script>
<script src="js/render-layout.js"></script>
<script src="js/data.js"></script>
<script src="js/citta-model.js"></script>
<script src="js/citta.js"></script>
<script src="js/flow-definitions.js"></script>
<script src="js/flow-engine.js"></script>
<script src="js/flow-view-model.js"></script>
<script src="js/flows.js"></script>
<script src="js/rupa.js"></script>
<script src="js/rupa-origin-model.js"></script>
<script src="js/rupa-origin.js"></script>
<script src="js/rupagen.js"></script>
<script src="js/dependent-origin-data.js"></script>
<script src="js/dependent-origin-model.js"></script>
<script src="js/dependent-origin-workspace.js"></script>
<script src="js/conditions.js"></script>
<script src="js/conditions-model.js"></script>
<script src="js/conditions-workspace.js"></script>
<script src="js/cause-condition-data.js"></script>
<script src="js/cause-condition.js"></script>
<script src="js/mywords.js"></script>
<script src="js/study-guide.js"></script>
<script src="js/main.js"></script>
</body>
</html>
